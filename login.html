<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloodNet | Secure Login & Admin Panel</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0b1628;
      --glass: rgba(255,255,255,0.08);
      --glass2: rgba(255,255,255,0.045);
      --line: rgba(255,255,255,0.12);
      --text: #f5f7ff;
      --muted: rgba(245,247,255,0.72);
      --red: #ff4d6d;
      --red2: #ff7a59;
      --cyan: #4dd7ff;
      --green: #40e0a4;
      --yellow: #ffcc66;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
    }* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,77,109,0.18), transparent 28%),
    radial-gradient(circle at top right, rgba(77,215,255,0.12), transparent 26%),
    linear-gradient(160deg, var(--bg), var(--bg2));
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button, input, select, textarea { font: inherit; }

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
  pointer-events: none;
  opacity: 0.35;
  z-index: 0;
}

.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(25px);
  pointer-events: none;
  z-index: 0;
  animation: float 10s ease-in-out infinite;
}

.orb-1 { width: 260px; height: 260px; left: -60px; top: 140px; background: rgba(255,77,109,0.22); }
.orb-2 { width: 320px; height: 320px; right: -80px; top: 40px; background: rgba(77,215,255,0.14); animation-delay: -3s; }
.orb-3 { width: 220px; height: 220px; right: 12%; bottom: 40px; background: rgba(64,224,164,0.10); animation-delay: -6s; }

.ripple {
  position: fixed;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: pulseRing 7s linear infinite;
}

.ripple-1 { width: 360px; height: 360px; left: -120px; bottom: 20%; }
.ripple-2 { width: 540px; height: 540px; right: -240px; top: 20%; animation-delay: -3.5s; }

.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: twinkle 3s infinite ease-in-out;
}

.shell {
  position: relative;
  z-index: 1;
  width: min(1440px, 94vw);
  margin: 0 auto;
  padding: 22px 0 50px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 22px;
  padding: 20px 24px;
  border-radius: 32px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}

.brand-icon {
  width: 58px;
  height: 58px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  font-size: 28px;
  background: linear-gradient(145deg, rgba(255,77,109,0.92), rgba(255,131,101,0.92));
  box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 14px 40px rgba(255,77,109,0.32);
  animation: glowPulse 3.2s ease-in-out infinite;
  flex: 0 0 auto;
}

.brand h1 {
  font-size: clamp(22px, 2.5vw, 34px);
  line-height: 1;
}

.brand p {
  margin-top: 6px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
}

.nav-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: flex-end;
}

.mini-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.86);
  cursor: pointer;
  transition: 0.25s ease;
  user-select: none;
}

.mini-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.11); }
.mini-btn.active { background: linear-gradient(135deg, rgba(255,77,109,0.92), rgba(255,122,89,0.92)); box-shadow: 0 12px 30px rgba(255,77,109,0.22); }

.hero {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 22px;
  align-items: stretch;
}

.glass {
  border-radius: 32px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  overflow: hidden;
}

.panel {
  position: relative;
  padding: 28px;
}

.panel::before {
  content: "";
  position: absolute;
  inset: -2px;
  background:
    radial-gradient(circle at top right, rgba(255,77,109,0.18), transparent 35%),
    radial-gradient(circle at bottom left, rgba(77,215,255,0.12), transparent 35%);
  pointer-events: none;
}

.panel > * { position: relative; z-index: 1; }

.badge-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 13px;
  color: rgba(255,255,255,0.86);
  background: rgba(255,255,255,0.05);
}

.glow { box-shadow: 0 0 24px rgba(255,77,109,0.18); }

.headline {
  font-size: clamp(30px, 4vw, 58px);
  line-height: 1.03;
  max-width: 12ch;
  margin-bottom: 14px;
}

.subtext {
  max-width: 62ch;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 22px;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 10px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 18px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-weight: 800;
  letter-spacing: 0.2px;
  transition: 0.25s ease;
  color: white;
}

.action-btn:hover { transform: translateY(-2px); }
.action-btn.primary { background: linear-gradient(135deg, var(--red), #ff7a59); box-shadow: 0 12px 28px rgba(255,77,109,0.25); }
.action-btn.secondary { background: linear-gradient(135deg, rgba(77,215,255,0.25), rgba(64,224,164,0.22)); border: 1px solid rgba(255,255,255,0.12); }
.action-btn.ghost { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.10); }
.action-btn.full { width: 100%; }

.feature-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 24px;
}

.feature-card {
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  padding: 18px;
  position: relative;
  overflow: hidden;
  min-height: 120px;
}

.feature-card::after {
  content: "";
  position: absolute;
  inset: auto -10px -36px auto;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,77,109,0.18), transparent 65%);
}

.feature-card h3 { font-size: 18px; margin-bottom: 8px; }
.feature-card p { color: var(--muted); line-height: 1.65; font-size: 14px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 22px;
}

.stat-card {
  padding: 18px;
  border-radius: 22px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

.stat-card span {
  display: block;
  font-size: 28px;
  font-weight: 800;
}

.stat-card p { margin-top: 6px; color: var(--muted); font-size: 13px; }

.stat-card::after {
  content: "";
  position: absolute;
  inset: auto -10px -35px auto;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(77,215,255,0.14), transparent 70%);
}

.login-card {
  padding: 24px;
}

.login-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
}

.login-head h2 { font-size: 24px; }
.login-head p { margin-top: 6px; color: var(--muted); font-size: 14px; line-height: 1.6; }

.live-pill {
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,77,109,0.18);
  border: 1px solid rgba(255,77,109,0.25);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: #ffd7de;
  white-space: nowrap;
}

.tabs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}

.tab-btn {
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.84);
  cursor: pointer;
  transition: 0.25s ease;
  font-weight: 700;
}

.tab-btn:hover { background: rgba(255,255,255,0.10); }
.tab-btn.active { background: linear-gradient(135deg, rgba(255,77,109,0.92), rgba(255,122,89,0.92)); box-shadow: 0 12px 30px rgba(255,77,109,0.22); }

.form-stack { display: grid; gap: 12px; }
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.field label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.68);
}

input, select, textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(8,14,24,0.6);
  color: var(--text);
  outline: none;
  transition: 0.25s ease;
}

input::placeholder, textarea::placeholder { color: rgba(245,247,255,0.42); }
input:focus, select:focus, textarea:focus {
  border-color: rgba(255,77,109,0.55);
  box-shadow: 0 0 0 4px rgba(255,77,109,0.08);
}

textarea {
  resize: vertical;
  min-height: 110px;
}

.password-wrap { position: relative; }
.toggle-pass {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  padding: 8px;
  border-radius: 10px;
}

.help-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}

.hint {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 18px 0;
  color: rgba(255,255,255,0.45);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

.divider::before,
.divider::after {
  content: "";
  height: 1px;
  flex: 1;
  background: rgba(255,255,255,0.10);
}

.status-box {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted);
  line-height: 1.6;
  min-height: 58px;
}

.dashboard-wrap {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1.02fr 0.98fr;
  gap: 22px;
}

.section {
  padding: 24px;
  border-radius: 32px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.section-head h3 { font-size: 24px; }
.section-head p { margin-top: 6px; color: var(--muted); font-size: 14px; line-height: 1.6; }

.pill-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.82);
  font-size: 13px;
}

.panel-box {
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(6,10,18,0.55);
  padding: 18px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.panel-box::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(255,77,109,0.12), transparent 30%);
  pointer-events: none;
}

.panel-box > * { position: relative; z-index: 1; }

.panel-box h4 { font-size: 18px; margin-bottom: 8px; }
.panel-box p { color: var(--muted); line-height: 1.65; font-size: 14px; }

.tool-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 14px;
}

.tool {
  padding: 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-height: 104px;
}

.tool .ico {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, rgba(255,77,109,0.92), rgba(255,122,89,0.92));
  flex: 0 0 auto;
  font-size: 18px;
  box-shadow: 0 10px 20px rgba(255,77,109,0.18);
}

.tool h5 { font-size: 15px; margin-bottom: 6px; }
.tool p { color: var(--muted); line-height: 1.55; font-size: 13px; }

.table-wrap { overflow: auto; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
table { width: 100%; border-collapse: collapse; min-width: 860px; background: rgba(6,10,18,0.55); }
thead th {
  text-align: left;
  padding: 14px 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.76);
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
tbody td {
  padding: 14px 16px;
  font-size: 14px;
  color: rgba(255,255,255,0.82);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  vertical-align: top;
}
tbody tr:hover { background: rgba(255,255,255,0.04); }

.row-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.small-action {
  padding: 8px 12px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  color: white;
  font-size: 12px;
  font-weight: 700;
}
.small-action.ok { background: linear-gradient(135deg, #40e0a4, #2ed6c8); }
.small-action.warn { background: linear-gradient(135deg, #ffcc66, #ff9f43); color: #1a1200; }
.small-action.danger { background: linear-gradient(135deg, #ff4d6d, #ff7a59); }

.hidden { display: none !important; }
.login-pair { margin-top: 16px; }
.login-pair h4 { margin-bottom: 10px; font-size: 18px; }
.login-pair ul {
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.8;
  font-size: 14px;
}

.footer-note {
  margin-top: 18px;
  color: rgba(245,247,255,0.52);
  text-align: center;
  font-size: 13px;
  line-height: 1.7;
}

.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 50;
  padding: 14px 18px;
  border-radius: 16px;
  background: rgba(5,10,18,0.94);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow);
  transform: translateY(120px);
  opacity: 0;
  transition: 0.35s ease;
  color: white;
  max-width: min(92vw, 360px);
}

.toast.show { opacity: 1; transform: translateY(0); }

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.62);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 60;
}

.modal-backdrop.show { display: flex; }

.modal {
  width: min(620px, 100%);
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.12);
  background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
  padding: 22px;
}

.modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.modal-head h3 { font-size: 22px; }
.modal-head p { margin-top: 6px; color: var(--muted); line-height: 1.6; font-size: 14px; }
.close-x {
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 14px;
  cursor: pointer;
}

.compat-list {
  margin-top: 16px;
  display: grid;
  gap: 12px;
}

.compat-item {
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 14px 16px;
}

.compat-item strong { display: block; margin-bottom: 5px; }
.compat-item span { color: var(--muted); font-size: 14px; line-height: 1.6; }

.user-welcome {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-bottom: 18px;
  padding: 16px;
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
}

.avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, rgba(77,215,255,0.35), rgba(64,224,164,0.22));
  border: 1px solid rgba(255,255,255,0.10);
  font-size: 22px;
  flex: 0 0 auto;
}

.avatar.admin {
  background: linear-gradient(135deg, rgba(255,77,109,0.45), rgba(255,122,89,0.24));
}

.user-welcome h4 { font-size: 18px; margin-bottom: 4px; }
.user-welcome p { color: var(--muted); font-size: 14px; line-height: 1.6; }

.table-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.search-mini {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.search-mini input { min-width: 220px; }

.note-box {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted);
  line-height: 1.6;
  font-size: 14px;
}

.switch-area {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.switch-card {
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.05);
}

.switch-card h5 { font-size: 14px; margin-bottom: 6px; }
.switch-card p { font-size: 13px; color: var(--muted); line-height: 1.55; }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,77,109,0.6); }
  70% { box-shadow: 0 0 0 12px rgba(255,77,109,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 14px 40px rgba(255,77,109,0.28); }
  50% { box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 18px 60px rgba(255,77,109,0.42); }
}
@keyframes float {
  0%,100% { transform: translateY(0) translateX(0); }
  50% { transform: translateY(-18px) translateX(10px); }
}
@keyframes pulseRing {
  0% { transform: scale(0.95); opacity: 0.4; }
  50% { opacity: 0.14; }
  100% { transform: scale(1.08); opacity: 0.4; }
}
@keyframes twinkle {
  0%,100% { opacity: 0.25; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

@media (max-width: 1160px) {
  .hero, .dashboard-wrap { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
